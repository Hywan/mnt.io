<main>

  <h1>All the keywords</h1>

  <p>All terms, alphabetically sorted, for the <em>keywords</em>
  taxonomy:</p>

  <div class="find-keywords">
    <input id="find_keywords" type="text" list="keywords" placeholder="Find a keyword…" autofocus>

    <datalist id="keywords">
    <option value="algorithm"><a href="/keywords/algorithm">algorithm</a></option>
    <option value="asmjs"><a href="/keywords/asmjs">asmjs</a></option>
    <option value="atoum"><a href="/keywords/atoum">atoum</a></option>
    <option value="binding"><a href="/keywords/binding">binding</a></option>
    <option value="c"><a href="/keywords/c">c</a></option>
    <option value="caldav"><a href="/keywords/caldav">caldav</a></option>
    <option value="carddav"><a href="/keywords/carddav">carddav</a></option>
    <option value="console"><a href="/keywords/console">console</a></option>
    <option value="data"><a href="/keywords/data">data</a></option>
    <option value="ffi"><a href="/keywords/ffi">ffi</a></option>
    <option value="fruux"><a href="/keywords/fruux">fruux</a></option>
    <option value="generation"><a href="/keywords/generation">generation</a></option>
    <option value="go"><a href="/keywords/go">go</a></option>
    <option value="gutenberg"><a href="/keywords/gutenberg">gutenberg</a></option>
    <option value="hoa"><a href="/keywords/hoa">hoa</a></option>
    <option value="java"><a href="/keywords/java">java</a></option>
    <option value="javascript"><a href="/keywords/javascript">javascript</a></option>
    <option value="job"><a href="/keywords/job">job</a></option>
    <option value="php"><a href="/keywords/php">php</a></option>
    <option value="postgres"><a href="/keywords/postgres">postgres</a></option>
    <option value="regular-expression"><a href="/keywords/regular-expression">regular expression</a></option>
    <option value="release"><a href="/keywords/release">release</a></option>
    <option value="rfc"><a href="/keywords/rfc">rfc</a></option>
    <option value="runtime"><a href="/keywords/runtime">runtime</a></option>
    <option value="rust"><a href="/keywords/rust">rust</a></option>
    <option value="string"><a href="/keywords/string">string</a></option>
    <option value="terminal"><a href="/keywords/terminal">terminal</a></option>
    <option value="test"><a href="/keywords/test">test</a></option>
    <option value="type"><a href="/keywords/type">type</a></option>
    <option value="versioning"><a href="/keywords/versioning">versioning</a></option>
    <option value="webassembly"><a href="/keywords/webassembly">webassembly</a></option>
    <option value="webdav"><a href="/keywords/webdav">webdav</a></option>
    
    </datalist>
  </form>

  <style>
  .find-keywords {
    text-align: center;

    input {
      margin-block-end: var(--space);
    }

    datalist {
      display: list-item;
      list-style: none;
      text-wrap: balance;

      > option {
        display: inline-block;
      }

      > option:has(+ option)::after {
        content: " •";
      }
    }
  }

  </style>

  <script>
  document.getElementById("find_keywords").addEventListener(
    'input',
    new function () {
      const options = Array
        .from(document.querySelectorAll('#keywords > option'))
        .map((option) => option.value);


      return (event) => {
        // If it autocompletes to an existing option.
        if (event.data && options.includes(event.data)) {
          document.location.pathname = `/keywords/${event.data}`;
        }
      };
    },
    false
  );
  </script>

</main>
